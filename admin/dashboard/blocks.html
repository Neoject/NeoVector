<section class="page-builder">
    <div class="page-builder-content">
        <div style="flex: 1;">
            <h2>Конструктор главной страницы</h2>
        </div>
        <button class="btn btn-primary" @click="root.openAddBlockModal">
            <i class="fas fa-plus"></i>
            <span>Добавить блок</span>
        </button>
    </div>
    <div v-if="root.blockSuccess" class="alert alert-success" style="margin-top: 15px;">
        <i class="fas fa-check-circle"></i>
        {{ root.blockSuccess }}
    </div>
    <div v-if="root.blockError" class="alert alert-error" style="margin-top: 15px;">
        <i class="fas fa-exclamation-circle"></i>
        {{ root.blockError }}
    </div>
    <div class="page-blocks-container">
        <div class="blocks-list">
            <div v-for="(block, index) in root.pageBlocks" :key="block.id" class="block-item"
                 :class="{ 'inactive': !block.is_active, 'dragging': block.id === root.draggingBlockId, 'footer-block': root.isFooterBlock(block) || root.isInfoButtonsBlock(block) }"
                 :draggable="!root.isFooterBlock(block) && !root.isInfoButtonsBlock(block)"
                 @dragstart="root.startDrag(block, $event)" @dragend="root.endDrag"
                 @dragover.prevent @drop="root.dropBlock(block, $event)">
                <div class="block-header">
                    <div class="block-info">
                        <span class="block-type">{{ root.getBlockTypeName(block.type) }}</span>
                        <span class="block-title">{{ block.title || 'Без названия'
                                                }}</span>
                        <span class="block-order">#{{ block.sort_order }}</span>
                    </div>
                    <div class="block-actions">
                        <button @click="root.toggleBlockActive(block)" class="btn btn-sm"
                                :class="block.is_active ? '' : 'btn-block-hidden'">
                            <i :class="block.is_active ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                        </button>
                        <button @click="root.editBlock(block)" class="btn btn-sm btn-edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button
                                v-if="!root.isFooterBlock(block) && !root.isInfoButtonsBlock(block)"
                                @click="root.deleteBlock(block.id)"
                                class="btn btn-sm btn-delete">
                            <i class="fas fa-trash"></i>
                        </button>
                        <div v-if="!root.isFooterBlock(block) && !root.isInfoButtonsBlock(block)"
                             class="drag-handle">
                            <i class="fas fa-grip-vertical"></i>
                        </div>
                    </div>
                </div>
                <div class="block-preview">
                    <div class="preview-content" v-html="root.getBlockPreview(block)"></div>
                </div>
            </div>
        </div>
        <div v-if="root.pageBlocks.length === 0" class="empty-blocks">
            <i class="fas fa-puzzle-piece"
               style="font-size: 48px; color: #666; margin-bottom: 20px;"></i>
            <p>Нет блоков на странице</p>
            <p style="color: #888; font-size: 14px;">Добавьте первый блок, чтобы начать
                создавать страницу</p>
        </div>
    </div>
    <div>
        <button class="btn btn-success" @click="root.saveBlocksOrder"
                :disabled="!root.hasUnsavedChanges">
            <i class="fas fa-save"></i>
            <span>Сохранить порядок</span>
        </button>
    </div>
</section>
