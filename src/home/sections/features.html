<section v-if="block && block.type === 'features'" id="features">
    <div class="container">
        <h2 class="section-title scroll-animate"
            :class="{ 'animated': isElementInView('features-title-' + block.id), 'hidden': !isElementInView('features-title-' + block.id) }"
            :id="'features-title-' + block.id">{{ block.settings.sectionTitle || 'Почему выбирают Aeternum'
            }}</h2>
        <div class="features-grid">
            <div v-for="(feature, featureIndex) in block.settings.features" :key="featureIndex"
                 class="feature-card"
                 :class="{ 'animated': isElementInView('feature-' + block.id + '-' + featureIndex), 'hidden': !isElementInView('feature-' + block.id + '-' + featureIndex) }"
                 :id="'feature-' + block.id + '-' + featureIndex">
                <div class="feature-icon">
                    <i :class="feature.icon"></i>
                </div>
                <h3 class="feature-title">{{ feature.title }}</h3>
                <p class="feature-description">{{ feature.description }}</p>
            </div>
        </div>
    </div>
</section>
