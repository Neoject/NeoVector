<section v-if="block && block.type === 'buttons' && block.settings.buttons && block.settings.buttons.length > 0"
         class="buttons-block">
    <div class="container">
        <h2 v-if="block.settings.sectionTitle" class="section-title scroll-animate"
            :class="{ 'animated': isElementInView('buttons-title-' + block.id), 'hidden': !isElementInView('buttons-title-' + block.id) }"
            :id="'buttons-title-' + block.id">{{ block.settings.sectionTitle }}</h2>
        <div class="buttons-container scroll-animate"
             :class="{ 'animated': isElementInView('buttons-container-' + block.id), 'hidden': !isElementInView('buttons-container-' + block.id) }"
             :id="'buttons-container-' + block.id">
            <a v-for="(button, index) in block.settings.buttons" :key="index" :href="getButtonLink(button)"
               @click="handleButtonClick($event, button)" class="btn"
               :class="getButtonClass(button.style)">
                {{ button.text }}
            </a>
        </div>
    </div>
</section>
