<section v-if="block && block.type === 'hero'" id="home" class="hero" :style="getHeroBackgroundStyle(block)">
    <div class="hero-content">
        <h1 :class="{ 'animated': isElementInView('hero-title-' + block.id), 'hidden': !isElementInView('hero-title-' + block.id) }"
            :id="'hero-title-' + block.id">{{ block.settings.mainTitle }}
        </h1>
        <p class="tagline"
           :class="{ 'animated': isElementInView('hero-tagline-' + block.id), 'hidden': !isElementInView('hero-tagline-' + block.id) }"
           :id="'hero-tagline-' + block.id" style="transition-delay: 0.2s">{{ block.settings.subtitle ||
        '' }}</p>
        <p class="description"
           :class="{ 'animated': isElementInView('hero-description-' + block.id), 'hidden': !isElementInView('hero-description-' + block.id) }"
           :id="'hero-description-' + block.id" style="transition-delay: 0.4s">{{ block.settings.description }}</p>
        <div class="hero-buttons"
             :class="{ 'animated': isElementInView('hero-buttons-' + block.id), 'hidden': !isElementInView('hero-buttons-' + block.id) }"
             :id="'hero-buttons-' + block.id" style="transition-delay: 0.6s">
            <a href="#" @click="handleNavigationClick($event, 'products')" class="btn">Смотреть коллекцию</a>
            <a href="#" @click="handleNavigationClick($event, 'features')" class="btn btn-outline">Узнать больше</a>
        </div>
    </div>
</section>
